<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Vibrant Neon Emerald to Forest Green Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E676" />
      <stop offset="100%" stop-color="#27AE60" />
    </linearGradient>
    
    <!-- Bright Green Accent for 3D highlights -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>

    <!-- Modern Tech Blue/Teal Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0b5a7a" />
      <stop offset="100%" stop-color="#1e9fb4" />
    </linearGradient>

    <!-- Drop Shadow for 3D overlap effect -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Letter B (Left Side, Blue Gradient) -->
  <path d="M 12,70 L 12,35 L 30,35 C 36,35 40,38 40,44 C 40,49 37,51 32,52 C 38,53 41,56 41,62 C 41,68 36,71 30,71 L 12,71 Z M 20,41 L 20,48 L 29,48 C 31,48 32,47 32,45 C 32,43 31,41 29,41 Z M 20,57 L 20,65 L 29,65 C 31,65 32,64 32,61 C 32,58 31,57 29,57 Z" fill="url(#blueGrad)" />

  <!-- Number 2 (Middle, Blue Gradient) -->
  <path d="M 43,35 C 49,35 53,38 53,44 C 53,49 50,52 46,57 L 39,64 L 54,64 L 54,71 L 34,71 L 34,64 L 43,54 C 46,51 47,49 47,46 C 47,43 45,41 43,41 C 41,41 39,43 39,45 L 34,45 C 34,39 38,35 43,35 Z" fill="url(#blueGrad)" opacity="0.95" />

  <!-- Letter A (Right Side, Green Gradient) -->
  <path d="M 58,71 L 68,35 L 78,71 L 70,71 L 68,60 L 61,60 L 59,71 Z M 62,54 L 67,54 L 66,45 Z" fill="url(#greenGrad)" />

  <!-- 3D Overlapping Growth Ribbon Arrow -->
  <!-- Segment 1: Rises up from left/center (Teal/Green mix) -->
  <path d="M 22,54 L 36,25 L 43,28 L 29,57 Z" fill="url(#blueGrad)" opacity="0.8" />

  <!-- Segment 2: Dips down in the middle (Darker green shade) -->
  <path d="M 36,25 L 50,42 L 56,38 L 42,21 Z" fill="#1b7a43" />

  <!-- Segment 3: Shoots up-right to form the arrow (Bright highlighted green with drop shadow) -->
  <g filter="url(#dropShadow)">
    <!-- Main stem going up-right -->
    <path d="M 48,44 L 72,15 L 77,20 L 53,49 Z" fill="url(#greenGrad)" />
    <!-- Arrowhead at the end -->
    <path d="M 64,15 L 82,10 L 77,28 Z" fill="url(#highlightGrad)" />
  </g>
</svg>
